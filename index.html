<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Match ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    overflow:hidden;
}

.phone{
    width:340px;
    height:670px;
    background:#fff;
    border-radius:40px;
    border:10px solid #222;
    position:relative;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,.25);
}

.notch{
    width:140px;
    height:26px;
    background:#222;
    border-radius:20px;
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
}

.header{
    margin-top:50px;
    text-align:center;
    font-size:24px;
    font-weight:700;
    color:#ff4f7a;
}

.card{
    width:280px;
    height:430px;
    background:linear-gradient(160deg,#fff,#ffe8ee);
    border-radius:25px;
    margin:25px auto;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.12);
    transition:.4s;
}

.avatar{
    font-size:95px;
}

.name{
    margin-top:20px;
    font-size:30px;
    font-weight:700;
    color:#333;
}

.tag{
    color:#777;
    margin-top:8px;
}

.buttons{
    position:absolute;
    bottom:35px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:30px;
}

button{
    width:70px;
    height:70px;
    border:none;
    border-radius:50%;
    font-size:30px;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.left{
    background:#fff;
    color:#ff4b5c;
}

.right{
    background:#ff4f7a;
    color:#fff;
}

button:hover{
    transform:scale(1.12);
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,.97);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    opacity:0;
    pointer-events:none;
    transition:.35s;
}

.overlay.show{
    opacity:1;
    pointer-events:auto;
}

.message{
    margin-top:25px;
    font-size:23px;
    font-weight:700;
    color:#ff4f7a;
}

.sub{
    margin-top:12px;
    color:#555;
    font-size:15px;
}

.doodle{
    font-size:90px;
    animation:bounce 1.3s infinite;
}

@keyframes bounce{
    50%{
        transform:translateY(-12px);
    }
}

.shake{
    animation:shake .35s;
}

@keyframes shake{
    20%{transform:translateX(-10px);}
    40%{transform:translateX(10px);}
    60%{transform:translateX(-8px);}
    80%{transform:translateX(8px);}
}

.popup{
    position:absolute;
    top:110px;
    left:50%;
    transform:translateX(-50%);
    background:#222;
    color:#fff;
    padding:14px 22px;
    border-radius:15px;
    font-size:15px;
    opacity:0;
    transition:.3s;
}

.popup.show{
    opacity:1;
}
</style>
</head>

<body>

<div class="phone">

<div class="notch"></div>

<div class="header">❤️ SoulMatch</div>

<div class="popup" id="popup">
Good try, you can't run away from me ❤️
</div>

<div class="card" id="card">
<div class="avatar">😎</div>
<div class="name">Sahil</div>
<div class="tag">25 • Designer • Looking for You ✨</div>
</div>

<div class="buttons">
<button class="left" id="left">✖</button>
<button class="right" id="right">❤</button>
</div>

<div class="overlay" id="success">

<div class="doodle">
👩🏻‍❤️‍👨🏻
</div>

<div class="message">
You found your soulmate ❤️
</div>

<div class="sub">
Looks like this swipe was meant to happen.
</div>

</div>

</div>

<script>

const left=document.getElementById("left");
const right=document.getElementById("right");
const popup=document.getElementById("popup");
const card=document.getElementById("card");
const success=document.getElementById("success");

left.onclick=()=>{

card.classList.add("shake");

popup.classList.add("show");

setTimeout(()=>{
popup.classList.remove("show");
card.classList.remove("shake");
},1800);

}

right.onclick=()=>{

card.style.transform="translateX(400px) rotate(20deg)";
card.style.opacity="0";

setTimeout(()=>{
success.classList.add("show");
},300);

}

</script>

</body>
</html>
