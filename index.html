<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dating App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffdde1,#ee9ca7);
overflow:hidden;

}

.phone{

width:340px;
height:690px;
background:#fff;
border-radius:40px;
padding:18px;
position:relative;
box-shadow:0 25px 60px rgba(0,0,0,.25);
overflow:hidden;
border:10px solid #111;

}

.notch{

width:140px;
height:25px;
background:#111;
border-radius:20px;
margin:auto;
margin-bottom:20px;

}

.header{

text-align:center;
font-size:24px;
font-weight:700;
color:#ff4d6d;
margin-bottom:20px;

}

.card{

width:100%;
height:480px;
background:#fafafa;
border-radius:28px;
overflow:hidden;
position:relative;
transition:.45s;

}

.card img{

width:100%;
height:100%;
object-fit:cover;

}

.overlay{

position:absolute;
bottom:0;
width:100%;
padding:24px;
background:linear-gradient(transparent,rgba(0,0,0,.8));

}

.overlay h2{

color:white;
font-size:34px;

}

.overlay p{

color:#eee;

}

.buttons{

display:flex;
justify-content:center;
gap:35px;
margin-top:25px;

}

button{

width:72px;
height:72px;
border-radius:50%;
border:none;
cursor:pointer;
font-size:32px;
transition:.25s;

}

.left{

background:#fff;
color:#ff4d6d;
box-shadow:0 8px 20px rgba(0,0,0,.15);

}

.right{

background:#ff4d6d;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,.18);

}

button:hover{

transform:scale(1.1);

}

.popup{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px 25px;
border-radius:18px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
font-size:18px;
font-weight:600;
text-align:center;
opacity:0;
pointer-events:none;
transition:.35s;
z-index:5;

}

.popup.show{

opacity:1;

}

.success{

position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:white;
opacity:0;
pointer-events:none;
transition:.5s;

}

.success.show{

opacity:1;

}

.success h2{

font-size:32px;
margin-top:20px;
color:#ff4d6d;

}

.success p{

font-size:18px;
margin-top:10px;
color:#666;

}

.doodle{

font-size:120px;

}

@keyframes shake{

0%{transform:translateX(0);}
20%{transform:translateX(-10px);}
40%{transform:translateX(10px);}
60%{transform:translateX(-8px);}
80%{transform:translateX(8px);}
100%{transform:translateX(0);}

}

.shake{

animation:shake .45s;

}

@keyframes swipe{

to{

transform:translateX(450px) rotate(30deg);
opacity:0;

}

}

.swipe{

animation:swipe .6s forwards;

}

.heart{

position:absolute;
color:#ff4d6d;
font-size:25px;
animation:float 4s linear infinite;
pointer-events:none;

}

@keyframes float{

0%{

transform:translateY(0) scale(.5);
opacity:1;

}

100%{

transform:translateY(-700px) scale(1.4);
opacity:0;

}

}

</style>

</head>
<body>

<div class="phone">

<div class="notch"></div>

<div class="header">❤ MatchMe</div>

<div class="card" id="card">

<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43?w=800&q=80">

<div class="overlay">
<h2>Sahil</h2>
<p>25 • Looking for my forever ❤️</p>
</div>

</div>

<div class="buttons">

<button class="left" id="left">✕</button>

<button class="right" id="right">❤</button>

</div>

<div class="popup" id="popup">
Good try 😏<br>
You can't run away from me!
</div>

<div class="success" id="success">

<div class="doodle">👩🏻‍❤️‍👨🏻</div>

<h2>You found your soulmate ❤️</h2>

<p>Some matches are simply meant to be.</p>

</div>

</div>

<script>

const left=document.getElementById("left");
const right=document.getElementById("right");

const popup=document.getElementById("popup");

const card=document.getElementById("card");

const success=document.getElementById("success");

left.addEventListener("click",()=>{

card.classList.add("shake");

popup.classList.add("show");

setTimeout(()=>{

popup.classList.remove("show");
card.classList.remove("shake");

},1800);

});

right.addEventListener("click",()=>{

card.classList.add("swipe");

setTimeout(()=>{

success.classList.add("show");

createHearts();

},600);

});

function createHearts(){

for(let i=0;i<35;i++){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"%";

heart.style.bottom="-30px";

heart.style.animationDelay=Math.random()*2+"s";

heart.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
